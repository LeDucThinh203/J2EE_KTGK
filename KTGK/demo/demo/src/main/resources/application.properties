spring.application.name=demo

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/course_registration?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=17012003Aa@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Use schema.sql / data.sql (instead of Hibernate auto-ddl)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Debug 500 errors (temporary but safe to keep for local dev)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
server.error.include-stacktrace=always

logging.file.name=logs/app.log

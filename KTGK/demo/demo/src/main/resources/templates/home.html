<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Home - Course List</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		body {
			background: radial-gradient(circle at top left, #eff6ff, #f8fafc 42%, #e2e8f0);
		}

		.page-shell {
			max-width: 1280px;
			margin: 0 auto;
		}

		.hero-bar {
			border: 1px solid rgba(148, 163, 184, 0.22);
			border-radius: 24px;
			background: rgba(255, 255, 255, 0.72);
			backdrop-filter: blur(14px);
			box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
		}

		.search-input {
			min-width: min(420px, 100%);
		}

		.course-card {
			border: 0;
			border-radius: 20px;
			box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
			overflow: hidden;
		}

		.course-image {
			height: 180px;
			object-fit: cover;
		}
	</style>
</head>
<body>
	<div class="container py-4 page-shell">
		<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
			<span th:text="${successMessage}">Success</span>
			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>
		<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
			<span th:text="${errorMessage}">Error</span>
			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>

		<div class="hero-bar p-3 p-md-4 mb-4">
			<div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
				<div>
					<p class="text-uppercase text-secondary fw-semibold mb-1">Course registration</p>
					<h1 class="h3 mb-1">Danh sách học phần</h1>
					<p class="text-secondary mb-0" th:text="'Tổng: ' + ${coursePage.totalElements} + ' học phần'">Tổng: 0 học phần</p>
				</div>
				<form class="d-flex flex-wrap gap-2 align-items-center" method="get" th:action="@{/home}">
					<input class="form-control search-input" type="text" name="q" th:value="${q}" placeholder="Tìm theo tên học phần..."/>
					<input type="hidden" name="page" value="0"/>
					<button class="btn btn-primary" type="submit">Search</button>
					<a class="btn btn-outline-secondary" th:href="@{/home}">Reset</a>
				</form>
			</div>
			<div class="d-flex flex-wrap align-items-center gap-2 mt-3">
				<div class="text-secondary">
					<span th:text="'Trang ' + ${currentPage + 1} + ' / ' + ${totalPages}">Trang 1 / 1</span>
				</div>
				<a th:if="${!canEnroll}" class="btn btn-outline-primary" th:href="@{/login}">Login</a>
				<a th:if="${!canEnroll}" class="btn btn-outline-secondary" th:href="@{/register}">Register Student</a>
				<a th:if="${canEnroll}" class="btn btn-outline-success" th:href="@{/my-courses}">My Courses</a>
				<a class="btn btn-primary" th:href="@{/courses/new}">Create Course</a>
			</div>
		</div>

		<div th:if="${coursePage.totalElements == 0}" class="alert alert-info" role="alert">
			Chưa có học phần nào.
		</div>

		<div th:if="${coursePage.totalElements > 0}" class="row g-3">
			<div class="col-12 col-md-6 col-lg-4" th:each="c : ${coursePage.content}">
				<div class="card course-card h-100">
					<div class="ratio ratio-16x9 bg-light">
						<img th:if="${c.image != null and !#strings.isEmpty(c.image)}"
							 th:src="${c.image}"
							 class="card-img-top course-image"
							 alt="Course image"/>
						<div th:if="${c.image == null or #strings.isEmpty(c.image)}" class="d-flex align-items-center justify-content-center text-secondary">
							<span>Không có hình ảnh</span>
						</div>
					</div>

					<div class="card-body">
						<h2 class="h6 card-title mb-2" th:text="${c.name}">Tên học phần</h2>
						<div class="d-flex flex-wrap gap-2">
							<span class="badge text-bg-primary" th:text="'Tín chỉ: ' + ${c.credits}">Tín chỉ: 0</span>
							<span class="badge text-bg-secondary" th:text="'Giảng viên: ' + (${c.lecturer} ?: 'N/A')">Giảng viên: N/A</span>
						</div>

						<div class="d-flex flex-wrap gap-2 mt-3">
							<a class="btn btn-sm btn-outline-primary" th:href="@{/courses/{id}/edit(id=${c.id})}">Update</a>
							<form th:if="${canEnroll and !enrolledCourseIds.contains(c.id)}" th:action="@{/enroll/{courseId}(courseId=${c.id})}" method="post" class="m-0">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button class="btn btn-sm btn-success" type="submit">Enroll</button>
							</form>
							<span th:if="${canEnroll and enrolledCourseIds.contains(c.id)}" class="badge text-bg-success align-self-center">Đã đăng ký</span>
							<form th:action="@{/courses/{id}/delete(id=${c.id})}" method="post" class="m-0">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<button class="btn btn-sm btn-outline-danger" type="submit"
										onclick="return confirm('Xóa học phần này?');">Delete</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>

		<nav th:if="${totalPages > 1}" class="mt-4" aria-label="Pagination">
			<ul class="pagination justify-content-center flex-wrap">
				<li class="page-item" th:classappend="${coursePage.hasPrevious()} ? '' : ' disabled'">
					<a class="page-link" th:href="${coursePage.hasPrevious()} ? @{/home(page=${currentPage - 1}, q=${q})} : '#'"><span aria-hidden="true">&laquo;</span> Prev</a>
				</li>

				<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
					th:classappend="${i == currentPage} ? ' active' : ''">
					<a class="page-link" th:href="@{/home(page=${i}, q=${q})}" th:text="${i + 1}">1</a>
				</li>

				<li class="page-item" th:classappend="${coursePage.hasNext()} ? '' : ' disabled'">
					<a class="page-link" th:href="${coursePage.hasNext()} ? @{/home(page=${currentPage + 1}, q=${q})} : '#'">Next <span aria-hidden="true">&raquo;</span></a>
				</li>
			</ul>
		</nav>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

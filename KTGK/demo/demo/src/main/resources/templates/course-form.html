<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title th:text="${mode == 'edit'} ? 'Cập nhật học phần' : 'Tạo học phần'">Course</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		body {
			background: radial-gradient(circle at top left, #e3f2fd, #f8f9fa);
		}

		.card {
			border: none;
			box-shadow: 0 0.5rem 1.25rem rgba(15, 23, 42, 0.08);
			border-radius: 1rem;
		}

		.form-label {
			font-weight: 500;
		}

		.btn-primary {
			padding-inline: 1.75rem;
		}
	</style>
</head>

<body>
	<div class="container py-4" style="max-width: 840px;">
		<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
			<div>
				<h1 class="h4 mb-0" th:text="${mode == 'edit' ? 'Cập nhật học phần' : 'Tạo học phần'}">Tạo học phần</h1>
				<p class="text-secondary mb-0">Nhập thông tin học phần</p>
			</div>
			<a class="btn btn-outline-secondary" th:href="@{/home}">Quay lại Home</a>
		</div>

		<div class="card">
			<div class="card-body">
				<form method="post"
					  th:action="${mode == 'edit'} ? @{/courses/{id}(id=${courseId})} : @{/courses}"
					  th:object="${courseForm}">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

					<div class="mb-3">
						<label class="form-label">Tên học phần</label>
						<input class="form-control" type="text" th:field="*{name}" placeholder="Ví dụ: Lập trình Java"/>
						<div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
					</div>

					<div class="row g-3">
						<div class="col-12 col-md-6">
							<label class="form-label">Số tín chỉ</label>
							<input class="form-control" type="number" min="1" max="20" th:field="*{credits}"/>
							<div class="text-danger small" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}"></div>
						</div>

						<div class="col-12 col-md-6">
							<label class="form-label">Giảng viên</label>
							<input class="form-control" type="text" th:field="*{lecturer}" placeholder="Ví dụ: GV A"/>
							<div class="text-danger small" th:if="${#fields.hasErrors('lecturer')}" th:errors="*{lecturer}"></div>
						</div>
					</div>

					<div class="mb-3 mt-3">
						<label class="form-label">Hình ảnh (URL)</label>
						<input class="form-control" type="text" th:field="*{image}" placeholder="https://..."/>
						<div class="text-danger small" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
						<div class="form-text">Có thể để trống.</div>
					</div>

					<div class="mb-3">
						<label class="form-label">Danh mục</label>
						<select class="form-select" th:field="*{categoryId}">
							<option value="">-- Không chọn --</option>
							<option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
						</select>
					</div>

					<div class="d-flex gap-2">
						<button class="btn btn-primary" type="submit" th:text="${mode == 'edit' ? 'Update' : 'Create'}">Create</button>
						<a class="btn btn-outline-secondary" th:href="@{/home}">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

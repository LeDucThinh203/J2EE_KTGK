<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Đăng nhập</title>
	<style>
		:root {
			--bg: #0f172a;
			--panel: rgba(255, 255, 255, 0.12);
			--panel-border: rgba(255, 255, 255, 0.18);
			--text: #e2e8f0;
			--muted: #94a3b8;
			--primary: #38bdf8;
			--primary-2: #2563eb;
			--danger: #f87171;
			--success: #4ade80;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: Inter, "Segoe UI", Arial, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 30%),
				radial-gradient(circle at 90% 10%, rgba(37, 99, 235, 0.28), transparent 22%),
				linear-gradient(135deg, #020617 0%, #0f172a 40%, #111827 100%);
		}

		.page {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.shell {
			width: min(1100px, 100%);
			display: grid;
			grid-template-columns: 1.05fr 0.95fr;
			gap: 24px;
		}

		.hero,
		.card {
			border: 1px solid var(--panel-border);
			background: var(--panel);
			backdrop-filter: blur(18px);
			-webkit-backdrop-filter: blur(18px);
			box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
			border-radius: 28px;
		}

		.hero {
			padding: 42px;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			position: relative;
			overflow: hidden;
		}

		.hero::before {
			content: "";
			position: absolute;
			inset: auto -80px -100px auto;
			width: 240px;
			height: 240px;
			border-radius: 50%;
			background: radial-gradient(circle, rgba(56, 189, 248, 0.28), transparent 70%);
			pointer-events: none;
		}

		.kicker {
			text-transform: uppercase;
			letter-spacing: 0.18em;
			font-size: 0.82rem;
			color: var(--muted);
			margin: 0 0 14px;
		}

		h1 {
			font-size: clamp(2.1rem, 4vw, 4rem);
			line-height: 1.02;
			margin: 0 0 18px;
			max-width: 10ch;
		}

		.lead {
			font-size: 1.03rem;
			line-height: 1.7;
			color: rgba(226, 232, 240, 0.88);
			max-width: 56ch;
			margin: 0;
		}

		.badges {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			margin-top: 28px;
		}

		.badge {
			padding: 10px 14px;
			border-radius: 999px;
			background: rgba(15, 23, 42, 0.32);
			border: 1px solid rgba(148, 163, 184, 0.25);
			color: var(--text);
			font-size: 0.92rem;
		}

		.links {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			margin-top: 34px;
		}

		.link {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 12px 16px;
			border-radius: 14px;
			text-decoration: none;
			font-weight: 600;
			transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
		}

		.link:hover {
			transform: translateY(-1px);
		}

		.link-primary {
			background: linear-gradient(135deg, var(--primary), var(--primary-2));
			color: white;
		}

		.link-ghost {
			border: 1px solid rgba(226, 232, 240, 0.2);
			color: var(--text);
			background: rgba(15, 23, 42, 0.22);
		}

		.card {
			padding: 34px;
		}

		.card h2 {
			margin: 0 0 8px;
			font-size: 1.8rem;
		}

		.card .subtitle {
			margin: 0 0 24px;
			color: var(--muted);
			line-height: 1.6;
		}

		.alert {
			padding: 14px 16px;
			border-radius: 16px;
			margin-bottom: 16px;
			font-weight: 600;
			line-height: 1.5;
		}

		.alert-success {
			background: rgba(74, 222, 128, 0.16);
			border: 1px solid rgba(74, 222, 128, 0.28);
			color: #bbf7d0;
		}

		.alert-danger {
			background: rgba(248, 113, 113, 0.16);
			border: 1px solid rgba(248, 113, 113, 0.28);
			color: #fecaca;
		}

		.form {
			display: grid;
			gap: 16px;
		}

		.field {
			display: grid;
			gap: 8px;
		}

		label {
			font-size: 0.95rem;
			font-weight: 700;
			color: #f8fafc;
		}

		input {
			width: 100%;
			padding: 14px 16px;
			border-radius: 16px;
			border: 1px solid rgba(148, 163, 184, 0.28);
			background: rgba(15, 23, 42, 0.38);
			color: var(--text);
			font-size: 1rem;
			outline: none;
			transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
		}

		input::placeholder {
			color: rgba(148, 163, 184, 0.8);
		}

		input:focus {
			border-color: rgba(56, 189, 248, 0.9);
			box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.16);
			background: rgba(15, 23, 42, 0.5);
		}

		.actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 8px;
		}

		button {
			appearance: none;
			border: 0;
			cursor: pointer;
			padding: 13px 18px;
			border-radius: 14px;
			font-size: 1rem;
			font-weight: 700;
			transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
		}

		button:hover {
			transform: translateY(-1px);
		}

		.btn-primary {
			color: white;
			background: linear-gradient(135deg, var(--primary), var(--primary-2));
			box-shadow: 0 14px 30px rgba(37, 99, 235, 0.22);
		}

		.btn-secondary {
			color: var(--text);
			background: rgba(148, 163, 184, 0.15);
			border: 1px solid rgba(148, 163, 184, 0.24);
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
		}

		.helper {
			margin-top: 6px;
			font-size: 0.9rem;
			color: var(--muted);
		}

		.error-text {
			font-size: 0.9rem;
			color: #fecaca;
		}

		@media (max-width: 920px) {
			.shell {
				grid-template-columns: 1fr;
			}

			.hero,
			.card {
				padding: 24px;
				border-radius: 22px;
			}
		}
	</style>
</head>
<body>
	<div class="page">
		<div class="shell">
			<section class="hero">
				<div>
					<p class="kicker">Course registration</p>
					<h1>Đăng nhập vào hệ thống</h1>
					<p class="lead">Dùng username và password để truy cập. Sau khi đăng nhập thành công, bạn sẽ được chuyển thẳng về trang /home.</p>
					<div class="badges">
						<span class="badge">Sinh viên</span>
						<span class="badge">Admin</span>
						<span class="badge">Course management</span>
					</div>
				</div>

				<div class="links">
					<a class="link link-primary" th:href="@{/register}">Đăng ký tài khoản</a>
					<a class="link link-ghost" th:href="@{/home}">Về trang chủ</a>
				</div>
			</section>

			<section class="card">
				<h2>Login</h2>
				<p class="subtitle">Nhập thông tin đăng nhập của bạn để tiếp tục.</p>

				<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
				<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

				<form class="form" method="post" th:action="@{/login}">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

					<div class="field">
						<label for="username">Username</label>
						<input id="username" type="text" name="username" autocomplete="username" placeholder="Nhập username" required/>
					</div>

					<div class="field">
						<label for="password">Password</label>
						<input id="password" type="password" name="password" autocomplete="current-password" placeholder="Nhập password" required/>
					</div>

					<div class="actions">
						<button class="btn-primary" type="submit">Đăng nhập</button>
						<a class="btn-secondary" th:href="@{/home}">Hủy</a>
					</div>
				</form>
			</section>
		</div>
	</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Đăng ký tài khoản sinh viên</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<style>
		body {
			min-height: 100vh;
			background: radial-gradient(circle at top left, #fef3c7, #f8fafc 45%, #e2e8f0);
		}

		.card {
			border: none;
			border-radius: 1.25rem;
			box-shadow: 0 1rem 2rem rgba(15, 23, 42, 0.12);
		}

		.hero {
			background: linear-gradient(135deg, rgba(234, 88, 12, 0.12), rgba(59, 130, 246, 0.10));
			border-radius: 1.25rem;
		}
	</style>
</head>
<body>
	<div class="container py-5" style="max-width: 920px;">
		<div class="row g-4 align-items-stretch">
			<div class="col-12 col-lg-5">
				<div class="hero h-100 p-4 p-lg-5 d-flex flex-column justify-content-between">
					<div>
						<p class="text-uppercase text-secondary fw-semibold mb-2">Student signup</p>
						<h1 class="display-6 fw-bold mb-3">Tạo tài khoản sinh viên</h1>
						<p class="text-secondary mb-0">Nhập username, password và email. Sau khi đăng ký thành công, hệ thống sẽ lưu vào bảng student và gán quyền mặc định là STUDENT.</p>
					</div>
					<div class="mt-4">
						<a class="btn btn-outline-dark" th:href="@{/home}">Quay lại trang chủ</a>
					</div>
				</div>
			</div>

			<div class="col-12 col-lg-7">
				<div class="card h-100">
					<div class="card-body p-4 p-lg-5">
						<h2 class="h4 mb-4">Đăng ký tài khoản</h2>

						<form method="post" th:action="@{/register}" th:object="${registrationForm}">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

							<div class="mb-3">
								<label class="form-label">Username</label>
								<input class="form-control" type="text" th:field="*{username}" placeholder="vd: anhtuan01"/>
								<div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
							</div>

							<div class="mb-3">
								<label class="form-label">Password</label>
								<input class="form-control" type="password" th:field="*{password}" placeholder="Ít nhất 6 ký tự"/>
								<div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
							</div>

							<div class="mb-4">
								<label class="form-label">Email</label>
								<input class="form-control" type="email" th:field="*{email}" placeholder="name@example.com"/>
								<div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
							</div>

							<div class="d-flex gap-2">
								<button class="btn btn-primary px-4" type="submit">Register</button>
								<a class="btn btn-outline-secondary" th:href="@{/home}">Cancel</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

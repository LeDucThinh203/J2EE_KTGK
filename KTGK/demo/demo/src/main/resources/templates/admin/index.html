<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Admin Dashboard</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnDr5pNlyT2bRjXh0IWAIaIH" crossorigin="anonymous">
	<style>
		body {
			min-height: 100vh;
			background: radial-gradient(circle at top left, rgba(239, 68, 68, 0.12), transparent 28%), linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
		}

		.shell {
			max-width: 1180px;
			margin: 0 auto;
		}

		.banner {
			border-radius: 28px;
			background: rgba(255, 255, 255, 0.82);
			backdrop-filter: blur(16px);
			box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
			border: 1px solid rgba(148, 163, 184, 0.22);
		}

		.stat-card {
			border: 0;
			border-radius: 20px;
			box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
		}
	</style>
</head>
<body>
	<div class="container py-4 shell">
		<div class="banner p-4 p-lg-5 mb-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
			<div>
				<p class="text-uppercase text-secondary fw-semibold mb-1">Admin zone</p>
				<h1 class="h2 mb-2">Trang quản trị</h1>
				<p class="text-secondary mb-0">Đây là trang dành riêng cho ROLE_ADMIN để kiểm tra câu 4.</p>
			</div>
			<div class="d-flex gap-2 flex-wrap">
				<a class="btn btn-outline-primary" th:href="@{/home}">Home</a>
				<form th:action="@{/logout}" method="post" class="m-0">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<button class="btn btn-outline-secondary" type="submit">Logout</button>
				</form>
			</div>
		</div>

		<div class="row g-3">
			<div class="col-12 col-md-4">
				<div class="card stat-card">
					<div class="card-body p-4">
						<p class="text-secondary mb-1">Students</p>
						<h2 class="display-6 fw-bold mb-0" th:text="${studentCount}">0</h2>
					</div>
				</div>
			</div>
			<div class="col-12 col-md-4">
				<div class="card stat-card">
					<div class="card-body p-4">
						<p class="text-secondary mb-1">Courses</p>
						<h2 class="display-6 fw-bold mb-0" th:text="${courseCount}">0</h2>
					</div>
				</div>
			</div>
			<div class="col-12 col-md-4">
				<div class="card stat-card">
					<div class="card-body p-4">
						<p class="text-secondary mb-1">Enrollments</p>
						<h2 class="display-6 fw-bold mb-0" th:text="${enrollmentCount}">0</h2>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-Yvpzt0y3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
